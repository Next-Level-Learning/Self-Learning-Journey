name: Request Elevated Access
description: 'Elevated access requests are now handled via GSD.'
title: '[DO NOT USE] Elevated Access - Process Changed'
labels: ['elevated access']
body: 
  - type: markdown
    id: notice
    attributes:
      value: |
        ## This Github form is **no longer active** and is kept for **redirection purposes only**.
        
        All Elevated access requests are now handled through **GSD**.
        
        **What You Need to Do:**
        1. Visit the [Elevated Access Process Documentation](https://test.salesforce.com)
        2. Follow instructions to sign up

  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Acknowledgement
      options:
        - label: I understand that any elevated access requests submitted through this GitHub form will **not be processed** and will be closed.
          required: true
    
